services:
  mongodb:
    image: mongo:latest
    container_name: agara-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agara-network

  backend:
    build:
      context: ./backend
    container_name: agara-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/${MONGO_DB:-agara-sofvix}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - mongodb
    networks:
      - agara-network

  frontend:
    build:
      context: ./frontend
    container_name: agara-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - INTERNAL_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - agara-network

  nginx:
    image: nginx:latest
    container_name: agara-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot-data:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - agara-network

  certbot:
    image: certbot/certbot
    container_name: agara-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot-data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - agara-network

networks:
  agara-network:
    driver: bridge

volumes:
  mongodb_data:
  certbot-etc:
  certbot-var:
  webroot-data:
